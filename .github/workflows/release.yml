name: Build and Release

permissions:
  contents: write

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"
jobs:
  build:
    name: ${{ matrix.build }}-build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        build: [linux, macos, windows]
        include:
          - build: linux
            os: ubuntu-latest
            flutter-version: "3.27.0"
            archive-name: flutter-app-linux.tar.gz
          - build: macos
            os: macos-latest
            flutter-version: "3.27.0"
            archive-name: flutter-app-macos.tar.gz
          - build: windows
            os: windows-latest
            flutter-version: "3.27.0"
            archive-name: flutter-app-windows.zip
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      # ==========================
      # Windows 专用：设置 Visual Studio 环境
      # ==========================
      - name: Setup Visual Studio environment
        if: matrix.build == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          toolset: 14.29  # 使用 VS2019 工具集

      # 或者手动设置 VS 环境变量（备选方案）
      - name: Setup Visual Studio (Alternative)
        if: matrix.build == 'windows'
        run: |
          echo "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build" >> $env:GITHUB_PATH
          echo "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build" >> $env:GITHUB_PATH
          echo "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build" >> $env:GITHUB_PATH
          echo "C:\Program Files (x86)\Microsoft Visual Studio\2019\BuildTools\VC\Auxiliary\Build" >> $env:GITHUB_PATH

      # ==========================
      # 设置 Flutter
      # ==========================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          cache: true

      # ==========================
      # 启用 Windows 桌面支持
      # ==========================
      - name: Enable Windows Desktop
        if: matrix.build == 'windows'
        run: flutter config --enable-windows-desktop

      # ==========================
      # 安装 Linux 依赖
      # ==========================
      - name: Install Linux Dependencies
        if: matrix.build == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      # ==========================
      # 安装 Flutter 依赖
      # ==========================
      - name: Install Flutter Dependencies
        run: flutter pub get

      # ==========================
      # 调试：检查 Visual Studio 安装
      # ==========================
      - name: Debug Visual Studio (Windows only)
        if: matrix.build == 'windows'
        run: |
          echo "Checking Visual Studio installations..."
          dir "C:\Program Files\Microsoft Visual Studio\" 2>nul || echo "Not found"
          dir "C:\Program Files (x86)\Microsoft Visual Studio\" 2>nul || echo "Not found"
          where cl.exe 2>nul || echo "cl.exe not found"
          where cmake 2>nul || echo "cmake not found"
          flutter doctor -v

      # ==========================
      # 构建 Flutter 应用
      # ==========================
      - name: Build Flutter App
        run: |
          case "${{ matrix.build }}" in
            windows)
              # 尝试使用不同的构建方式
              flutter build windows --release --verbose
              ;;
            macos)
              flutter build macos --release
              ;;
            linux)
              flutter build linux --release
              ;;
          esac
        shell: bash
        env:
          # 显式设置 Visual Studio 版本
          VisualStudioVersion: "16.0"  # VS2019
          CMAKE_GENERATOR: "Visual Studio 16 2019"
          CMAKE_GENERATOR_PLATFORM: x64

      # ==========================
      # 打包归档
      # ==========================
      - name: Package Artifacts
        shell: bash
        run: |
          mkdir -p archive
          cd archive

          case "${{ matrix.build }}" in
            windows)
              BUILD_PATH="../build/windows/x64/runner/Release"
              if [ -d "$BUILD_PATH" ]; then
                cp -r "$BUILD_PATH" "./flutter_app"
                echo "✅ Copied Windows build"
              else
                echo "❌ Build path not found: $BUILD_PATH"
                echo "Available build directories:"
                ls -la ../build/windows/x64/runner/ 2>/dev/null || echo "No build found"
                exit 1
              fi
              ;;
            macos)
              BUILD_PATH="../build/macos/Build/Products/Release"
              APP_NAME="*.app"
              cp -r $BUILD_PATH/$APP_NAME ./
              ;;
            linux)
              BUILD_PATH="../build/linux/x64/release/bundle"
              BUNDLE_NAME="flutter_app"
              cp -r "$BUILD_PATH" "./$BUNDLE_NAME"
              ;;
          esac

          # 复制 README
          if [ -f "../README.md" ]; then
            cp ../README.md ./
          fi

          echo "📦 Creating archive: ${{ matrix.archive-name }}"
          
          if [ "${{ matrix.build }}" = "windows" ]; then
            zip -r "${{ matrix.archive-name }}" ./*
          else
            tar -czf "${{ matrix.archive-name }}" ./*
          fi

          echo "✅ Archive created successfully."
          ls -lh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive-name }}
          path: archive/${{ matrix.archive-name }}
          retention-days: 5