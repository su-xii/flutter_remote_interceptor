name: Build Windows App (Simplified)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      # 关键：设置 VS 环境
      - name: Setup Visual Studio
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64

      # 安装 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.4'
          channel: 'stable'

      # 验证环境
      - name: Check environment
        run: |
          flutter doctor -v
          cmake --version
          where cl
        shell: cmd

      # 构建
      - name: Build
        run: flutter build windows --release

      # 打包
      - name: Package
        run: |
          mkdir release
          xcopy /E /I "build\windows\x64\runner\Release" "release\flutter_app"
          cd release
          tar -czf ../flutter-app-windows.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: flutter-app-windows.tar.gz