name: Quick Windows Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      # 安装 Visual Studio 2019 Build Tools
      - name: Install Visual Studio 2019
        run: |
          choco install visualstudio2019buildtools -y --no-progress
          choco install visualstudio2019-workload-vctools -y --no-progress
        shell: powershell

      # 设置 VS 2019 环境变量
      - name: Setup VS 2019 Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          vsversion: '2019'

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b 3.27.0 C:\flutter
          echo "C:\flutter\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
        shell: powershell

      - name: Flutter Doctor
        run: flutter doctor -v
        shell: powershell

      - name: Enable Windows
        run: flutter config --enable-windows-desktop
        shell: powershell

      # 修改 CMakeLists.txt 确保使用 VS 2019
      - name: Fix CMake configuration
        run: |
          $cmakeFile = "windows/CMakeLists.txt"
          if (Test-Path $cmakeFile) {
            (Get-Content $cmakeFile) -replace 'Visual Studio 17 2022', 'Visual Studio 16 2019' | Set-Content $cmakeFile
            Write-Host "✅ Set CMake to use VS 2019"
          }
        shell: powershell

      - name: Build
        run: flutter build windows --release
        env:
          VisualStudioVersion: '16.0'
        shell: powershell

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: build/windows/x64/runner/Release/