name: Quick Windows Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable C:\flutter
          echo "C:\flutter\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
        shell: powershell

      - name: Flutter Doctor
        run: flutter doctor -v
        shell: powershell

      - name: Enable Windows
        run: flutter config --enable-windows-desktop
        shell: powershell

      - name: Build
        run: flutter build windows --release
        shell: powershell

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: build/windows/x64/runner/Release/